<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Board</title>
<style>
  :root {
    --bg: #f0f2f5; --card: #fff; --primary: #4f46e5; --primary-light: #e0e7ff;
    --high: #ef4444; --medium: #f59e0b; --low: #22c55e;
    --todo: #94a3b8; --progress: #3b82f6; --done: #22c55e;
    --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
    --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,.08);
    --badge-high-bg: #fef2f2; --badge-med-bg: #fffbeb; --badge-med-color: #b45309;
    --badge-low-bg: #f0fdf4; --badge-low-color: #15803d;
    --badge-date-bg: #f1f5f9;
    --conn-ok-bg: #f0fdf4; --conn-ok-color: #15803d;
    --conn-err-bg: #fef2f2;
    --modal-overlay: rgba(0,0,0,.4);
    --toast-bg: #1e293b;
  }
  html.dark {
    --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --primary-light: #312e81;
    --text: #e2e8f0; --muted: #94a3b8; --border: #334155;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
    --badge-high-bg: #451a1a; --badge-med-bg: #452a08; --badge-med-color: #fbbf24;
    --badge-low-bg: #0f2e1a; --badge-low-color: #4ade80;
    --badge-date-bg: #1e293b;
    --conn-ok-bg: #0f2e1a; --conn-ok-color: #4ade80;
    --conn-err-bg: #451a1a;
    --modal-overlay: rgba(0,0,0,.7);
    --toast-bg: #334155;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .conn-bar { display:none; }
  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-left:10px; }
  .status-dot.ok { background:var(--done); }
  .status-dot.err { background:var(--high); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  header { background:var(--primary); color:#fff; padding:20px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  header h1 { font-size:1.4rem; font-weight:700; }
  .header-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .header-actions button { background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.25); padding:8px 14px; border-radius:var(--radius); cursor:pointer; font-size:.82rem; font-weight:500; transition:.15s; }
  .header-actions button:hover { background:rgba(255,255,255,.3); }

  .stats { display:flex; gap:16px; padding:16px 32px; flex-wrap:wrap; }
  .stat { background:var(--card); border-radius:var(--radius); padding:14px 20px; box-shadow:var(--shadow); min-width:130px; text-align:center; }
  .stat .num { font-size:1.6rem; font-weight:700; }
  .stat .label { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }

  .controls { padding:12px 32px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .controls select, .controls input[type=text] { padding:8px 12px; border:1px solid var(--border); border-radius:var(--radius); font-size:.85rem; background:var(--card); color:var(--text); }
  .controls input[type=text] { flex:1; min-width:180px; }

  .board { padding:8px 32px 32px; }
  .columns { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .column { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .col-header { padding:14px 16px; font-weight:700; font-size:.9rem; display:flex; align-items:center; gap:8px; border-bottom:2px solid var(--border); }
  .col-header .dot { width:10px; height:10px; border-radius:50%; }
  .col-todo .col-header .dot { background:var(--todo); }
  .col-progress .col-header .dot { background:var(--progress); }
  .col-done .col-header .dot { background:var(--done); }
  .col-header .count { margin-left:auto; background:var(--bg); padding:2px 8px; border-radius:12px; font-size:.75rem; color:var(--muted); }
  .col-body { padding:10px; min-height:120px; }

  .task { background:var(--bg); border-radius:8px; padding:12px; margin-bottom:8px; cursor:grab; border-left:4px solid transparent; transition:transform .2s ease, box-shadow .2s ease; position:relative; user-select:none; }
  .task:active { cursor:grabbing; }
  .task:hover { box-shadow:0 2px 8px rgba(0,0,0,.1); }
  .task.dragging { opacity:.3; transform:scale(.95); }
  .drop-indicator { height:3px; background:var(--primary); border-radius:3px; margin:4px 0; transition:opacity .15s; }
  .col-body.drag-active { background:rgba(79,70,229,.03); border-radius:8px; }
  .task.p-high { border-left-color:var(--high); }
  .task.p-medium { border-left-color:var(--medium); }
  .task.p-low { border-left-color:var(--low); }
  .task .title { font-weight:600; font-size:.88rem; margin-bottom:6px; }
  .task .desc { font-size:.78rem; color:var(--muted); margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .task .meta { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .badge { padding:2px 8px; border-radius:12px; font-size:.7rem; font-weight:600; }
  .badge-high { background:var(--badge-high-bg); color:var(--high); }
  .badge-medium { background:var(--badge-med-bg); color:var(--badge-med-color); }
  .badge-low { background:var(--badge-low-bg); color:var(--badge-low-color); }
  .badge-assignee { background:var(--primary-light); color:var(--primary); }
  .badge-date { background:var(--badge-date-bg); color:var(--muted); }
  .task-actions { position:absolute; top:8px; right:8px; display:flex; gap:4px; opacity:0; transition:.15s; }
  .task:hover .task-actions { opacity:1; }
  .task-actions button { background:var(--card); border:1px solid var(--border); width:26px; height:26px; border-radius:6px; cursor:pointer; font-size:.75rem; display:flex; align-items:center; justify-content:center; }
  .task-actions button:hover { background:var(--primary-light); }

  .overlay { display:none; position:fixed; inset:0; background:var(--modal-overlay); z-index:100; align-items:center; justify-content:center; }
  .overlay.open { display:flex; }
  .modal { background:var(--card); border-radius:14px; padding:28px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .modal h2 { font-size:1.1rem; margin-bottom:18px; }
  .modal label { display:block; font-size:.82rem; font-weight:600; margin-bottom:4px; color:var(--muted); }
  .modal input, .modal select, .modal textarea { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:.88rem; margin-bottom:14px; font-family:inherit; background:var(--bg); color:var(--text); }
  .modal textarea { resize:vertical; min-height:70px; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
  .btn { padding:9px 18px; border-radius:8px; border:none; font-size:.85rem; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-primary:hover { opacity:.9; }
  .btn-cancel { background:var(--bg); color:var(--text); }
  .btn-danger { background:var(--badge-high-bg); color:var(--high); }
  .btn-danger:hover { opacity:.8; }

  .empty { text-align:center; color:var(--muted); font-size:.82rem; padding:20px 0; }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--toast-bg); color:#fff; padding:12px 20px; border-radius:10px; font-size:.85rem; z-index:200; transform:translateY(80px); opacity:0; transition:.3s; }

  .theme-toggle { background:none; border:none; color:#fff; font-size:1.1rem; cursor:pointer; padding:8px; border-radius:var(--radius); transition:.15s; }
  .theme-toggle:hover { background:rgba(255,255,255,.2); }
  .toast.show { transform:translateY(0); opacity:1; }

  @media(max-width:800px) {
    .columns { grid-template-columns:1fr; }
    header, .stats, .controls, .board, .conn-bar { padding-left:16px; padding-right:16px; }
  }
</style>
</head>
<body>

<div class="conn-bar ok" id="connBar">
  <span class="dot"></span>
  <span id="connText">Connecting...</span>
</div>

<header>
  <h1>Task Board <span class="status-dot ok" id="statusDot" title="Connected"></span></h1>
  <div class="header-actions">
    <button onclick="openModal()">+ New Task</button>
    <button onclick="refreshTasks()">Refresh</button>
    <button class="theme-toggle" onclick="toggleDark()" id="themeBtn" title="Toggle dark mode">&#9790;</button>
  </div>
</header>

<div class="stats" id="stats"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Search tasks..." oninput="renderBoard()">
  <select id="filterPriority" onchange="renderBoard()">
    <option value="">All Priorities</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
  <select id="filterAssignee" onchange="renderBoard()">
    <option value="">All Assignees</option>
  </select>
</div>

<div class="board">
  <div class="columns">
    <div class="column col-todo">
      <div class="col-header"><span class="dot"></span>To Do<span class="count" id="countTodo">0</span></div>
      <div class="col-body" id="colTodo"><div class="empty">Loading...</div></div>
    </div>
    <div class="column col-progress">
      <div class="col-header"><span class="dot"></span>In Progress<span class="count" id="countProgress">0</span></div>
      <div class="col-body" id="colProgress"><div class="empty">No tasks</div></div>
    </div>
    <div class="column col-done">
      <div class="col-header"><span class="dot"></span>Done<span class="count" id="countDone">0</span></div>
      <div class="col-body" id="colDone"><div class="empty">No tasks</div></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">New Task</h2>
    <input type="hidden" id="taskId">
    <label>Title *</label>
    <input type="text" id="taskName" placeholder="Task title">
    <label>Description</label>
    <textarea id="taskDesc" placeholder="Optional description..."></textarea>
    <label>Priority</label>
    <select id="taskPriority">
      <option value="high">High</option>
      <option value="medium" selected>Medium</option>
      <option value="low">Low</option>
    </select>
    <label>Status</label>
    <select id="taskStatus">
      <option value="todo">To Do</option>
      <option value="progress">In Progress</option>
      <option value="done">Done</option>
    </select>
    <label>Assigned To</label>
    <input type="text" id="taskAssignee" placeholder="Name">
    <label>Due Date</label>
    <input type="date" id="taskDue">
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="btnDelete" style="display:none" onclick="deleteTask()">Delete</button>
      <button class="btn btn-primary" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBBK7nRG11X3t4xe35l3y3WTkNrOVIABYXgEzZROpFwMWoO0LZr593jEqzCz3Pkl6ziA/exec';
var tasks = [];
var cbCounter = 0;
var dragId = null;
var saveTimer = null;
var ORDER_KEY = 'taskboard_order';

// ---- Local order storage ----
function loadOrder() {
  try { return JSON.parse(localStorage.getItem(ORDER_KEY)) || {}; } catch(e) { return {}; }
}
function saveOrder() {
  var order = {};
  tasks.forEach(function(t) { order[t.id] = t.order; });
  localStorage.setItem(ORDER_KEY, JSON.stringify(order));
}
function applyOrder() {
  var order = loadOrder();
  // Assign saved order, or keep creation order for new tasks
  var maxOrder = 0;
  tasks.forEach(function(t) {
    if (order[t.id] !== undefined) {
      t.order = order[t.id];
      if (t.order > maxOrder) maxOrder = t.order;
    }
  });
  // Tasks without saved order get placed at the end in their original sequence
  tasks.forEach(function(t) {
    if (order[t.id] === undefined) {
      maxOrder++;
      t.order = maxOrder;
    }
  });
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function toast(msg, dur) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, dur || 2000);
}

function setConn(ok, text) {
  var dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
  dot.title = text;
}

// ---- JSONP ----

function jsonp(params) {
  return new Promise(function(resolve, reject) {
    var cbName = '_tb_cb_' + (++cbCounter);
    var timeout = setTimeout(function() {
      delete window[cbName];
      if (s.parentNode) s.parentNode.removeChild(s);
      reject(new Error('Request timed out'));
    }, 20000);
    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      if (s.parentNode) s.parentNode.removeChild(s);
      resolve(data);
    };
    var url = SCRIPT_URL + '?callback=' + cbName;
    var keys = Object.keys(params);
    for (var i = 0; i < keys.length; i++) url += '&' + encodeURIComponent(keys[i]) + '=' + encodeURIComponent(params[keys[i]]);
    var s = document.createElement('script');
    s.src = url;
    s.onerror = function() { clearTimeout(timeout); delete window[cbName]; if (s.parentNode) s.parentNode.removeChild(s); reject(new Error('Network error')); };
    document.head.appendChild(s);
  });
}

// ---- API ----

function refreshTasks() {
  setConn(true, 'Syncing...');
  jsonp({ action: 'getAll' }).then(function(data) {
    if (Array.isArray(data)) { tasks = data; applyOrder(); renderBoard(); setConn(true, 'Connected — auto-refreshes every 15s'); }
  }).catch(function(err) { setConn(false, 'Error: ' + err.message); });
}

function apiSave(task) {
  return jsonp({ action: 'save', data: JSON.stringify(task) }).catch(function(err) {
    toast('Save error'); setConn(false, 'Save failed — click Refresh');
  });
}

function apiDel(id) {
  return jsonp({ action: 'delete', id: id }).catch(function(err) { toast('Delete error'); });
}


// ---- Modal ----

function openModal(id) {
  if (dragId) return; // don't open modal while dragging
  document.getElementById('modalTitle').textContent = id ? 'Edit Task' : 'New Task';
  document.getElementById('btnDelete').style.display = id ? '' : 'none';
  if (id) {
    var t = tasks.find(function(x) { return x.id === id; });
    if (!t) return;
    document.getElementById('taskId').value = t.id;
    document.getElementById('taskName').value = t.title;
    document.getElementById('taskDesc').value = t.desc || '';
    document.getElementById('taskPriority').value = t.priority;
    document.getElementById('taskStatus').value = t.status;
    document.getElementById('taskAssignee').value = t.assignee || '';
    document.getElementById('taskDue').value = t.due || '';
  } else {
    document.getElementById('taskId').value = '';
    document.getElementById('taskName').value = '';
    document.getElementById('taskDesc').value = '';
    document.getElementById('taskPriority').value = 'medium';
    document.getElementById('taskStatus').value = 'todo';
    document.getElementById('taskAssignee').value = '';
    document.getElementById('taskDue').value = '';
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('taskName').focus();
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function saveTask() {
  var title = document.getElementById('taskName').value.trim();
  if (!title) { alert('Title is required'); return; }
  var id = document.getElementById('taskId').value;
  var existing = id ? tasks.find(function(x) { return x.id === id; }) : null;
  var task = {
    id: id || uid(), title: title,
    desc: document.getElementById('taskDesc').value.trim(),
    priority: document.getElementById('taskPriority').value,
    status: document.getElementById('taskStatus').value,
    assignee: document.getElementById('taskAssignee').value.trim(),
    due: document.getElementById('taskDue').value,
    order: existing ? (existing.order || 0) : 999,
    created: existing ? existing.created : new Date().toISOString(),
    updated: new Date().toISOString()
  };
  if (id) { var idx = tasks.findIndex(function(x) { return x.id === id; }); if (idx >= 0) tasks[idx] = task; }
  else tasks.push(task);
  renderBoard(); closeModal(); toast('Saving...');
  apiSave(task).then(function() { toast('Saved!'); });
}

function deleteTask() {
  var id = document.getElementById('taskId').value;
  if (!id || !confirm('Delete this task?')) return;
  tasks = tasks.filter(function(x) { return x.id !== id; });
  renderBoard(); closeModal(); toast('Deleting...');
  apiDel(id).then(function() { toast('Deleted'); });
}

function moveTask(id, newStatus) {
  var t = tasks.find(function(x) { return x.id === id; });
  if (!t) return;
  t.status = newStatus; t.updated = new Date().toISOString();
  renderBoard(); toast('Moving...');
  apiSave(t).then(function() { toast('Moved!'); });
}

// ---- Drag & Drop (smooth, 1 save per drag) ----

var didDrag = false;

function getColTasks(status) {
  return tasks.filter(function(t) { return t.status === status; }).sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
}



document.addEventListener('dragstart', function(e) {
  var taskEl = e.target.closest('.task');
  if (!taskEl) return;
  dragId = taskEl.getAttribute('data-id');
  didDrag = false;
  setTimeout(function() { taskEl.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragId);
  // Highlight all columns
  document.querySelectorAll('.col-body').forEach(function(el) { el.classList.add('drag-active'); });
});

document.addEventListener('dragend', function(e) {
  document.querySelectorAll('.dragging').forEach(function(el) { el.classList.remove('dragging'); });
  document.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });
  document.querySelectorAll('.drag-active').forEach(function(el) { el.classList.remove('drag-active'); });
  if (didDrag) {
    // prevent the click from opening the modal
    setTimeout(function() { dragId = null; }, 200);
  } else {
    dragId = null;
  }
});

document.addEventListener('dragover', function(e) {
  var colBody = e.target.closest('.col-body');
  if (!colBody) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  // Show drop indicator
  document.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });
  var taskEl = e.target.closest('.task');
  var indicator = document.createElement('div');
  indicator.className = 'drop-indicator';
  if (taskEl && taskEl.getAttribute('data-id') !== dragId) {
    var rect = taskEl.getBoundingClientRect();
    var mid = rect.top + rect.height / 2;
    if (e.clientY < mid) {
      taskEl.parentNode.insertBefore(indicator, taskEl);
    } else {
      taskEl.parentNode.insertBefore(indicator, taskEl.nextSibling);
    }
  } else if (!taskEl) {
    colBody.appendChild(indicator);
  }
});

document.addEventListener('drop', function(e) {
  var colBody = e.target.closest('.col-body');
  if (!colBody || !dragId) return;
  e.preventDefault();
  didDrag = true;
  document.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });

  var col = colBody.parentElement;
  var newStatus = col.classList.contains('col-todo') ? 'todo' : col.classList.contains('col-progress') ? 'progress' : 'done';

  var draggedTask = tasks.find(function(t) { return t.id === dragId; });
  if (!draggedTask) return;

  var oldStatus = draggedTask.status;
  var statusChanged = oldStatus !== newStatus;

  // Get tasks in target column (excluding dragged), sorted by order
  var colTasks = getColTasks(newStatus).filter(function(t) { return t.id !== dragId; });
  var taskEl = e.target.closest('.task');

  // Figure out insert position and rebuild order as integers
  var insertIdx = colTasks.length; // default: end

  if (taskEl && taskEl.getAttribute('data-id') !== dragId) {
    var targetId = taskEl.getAttribute('data-id');
    for (var i = 0; i < colTasks.length; i++) {
      if (colTasks[i].id === targetId) {
        var rect = taskEl.getBoundingClientRect();
        insertIdx = e.clientY > rect.top + rect.height / 2 ? i + 1 : i;
        break;
      }
    }
  }

  // Insert dragged task at position
  colTasks.splice(insertIdx, 0, draggedTask);

  // Reassign clean integer orders for entire column
  for (var j = 0; j < colTasks.length; j++) {
    colTasks[j].order = j;
  }

  // Update dragged task
  draggedTask.status = newStatus;
  draggedTask.updated = new Date().toISOString();

  // Save order locally (instant, no API lag)
  saveOrder();
  renderBoard();

  // Only call API if column changed (status update needed)
  if (statusChanged) {
    toast('Moving...');
    apiSave(draggedTask).then(function() { toast('Moved!'); });
  } else {
    toast('Reordered!');
  }
});

// ---- Render ----

function renderBoard() {
  var search = document.getElementById('search').value.toLowerCase();
  var fp = document.getElementById('filterPriority').value;
  var fa = document.getElementById('filterAssignee').value;

  var assignees = [];
  tasks.forEach(function(t) { if (t.assignee && assignees.indexOf(t.assignee) === -1) assignees.push(t.assignee); });
  var sel = document.getElementById('filterAssignee');
  var curVal = sel.value;
  sel.innerHTML = '<option value="">All Assignees</option>' + assignees.map(function(a) { return '<option value="' + esc(a) + '">' + esc(a) + '</option>'; }).join('');
  sel.value = curVal;

  var filtered = tasks.filter(function(t) {
    if (search && t.title.toLowerCase().indexOf(search) === -1 && (t.desc || '').toLowerCase().indexOf(search) === -1) return false;
    if (fp && t.priority !== fp) return false;
    if (fa && t.assignee !== fa) return false;
    return true;
  }).sort(function(a, b) { return (a.order || 0) - (b.order || 0); });

  var groups = { todo: [], progress: [], done: [] };
  filtered.forEach(function(t) { if (groups[t.status]) groups[t.status].push(t); });

  ['todo', 'progress', 'done'].forEach(function(status) {
    var colId = status === 'todo' ? 'colTodo' : status === 'progress' ? 'colProgress' : 'colDone';
    var countId = status === 'todo' ? 'countTodo' : status === 'progress' ? 'countProgress' : 'countDone';
    var col = document.getElementById(colId);
    var count = document.getElementById(countId);
    count.textContent = groups[status].length;
    if (!groups[status].length) { col.innerHTML = '<div class="empty">No tasks</div>'; return; }
    col.innerHTML = groups[status].map(function(t, i) {
      var moves = [];
      if (status !== 'todo') moves.push('<button title="Move to To Do" onclick="event.stopPropagation();moveTask(\'' + t.id + '\',\'todo\')">&laquo;</button>');
      if (status !== 'done') moves.push('<button title="Move forward" onclick="event.stopPropagation();moveTask(\'' + t.id + '\',\'' + (status === 'todo' ? 'progress' : 'done') + '\')">&raquo;</button>');
      return '<div class="task p-' + t.priority + '" data-id="' + t.id + '" draggable="true" onclick="openModal(\'' + t.id + '\')">' +
        '<div class="task-actions">' + moves.join('') + '</div>' +
        '<div class="title"><span style="color:var(--muted);font-size:.72rem;margin-right:4px">' + (i + 1) + '.</span>' + esc(t.title) + '</div>' +
        (t.desc ? '<div class="desc">' + esc(t.desc) + '</div>' : '') +
        '<div class="meta">' +
        '<span class="badge badge-' + t.priority + '">' + t.priority.toUpperCase() + '</span>' +
        (t.assignee ? '<span class="badge badge-assignee">' + esc(t.assignee) + '</span>' : '') +
        (t.due ? '<span class="badge badge-date">' + t.due + '</span>' : '') +
        '</div></div>';
    }).join('');
  });

  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="num">' + tasks.length + '</div><div class="label">Total</div></div>' +
    '<div class="stat"><div class="num" style="color:var(--todo)">' + tasks.filter(function(t) { return t.status === 'todo'; }).length + '</div><div class="label">To Do</div></div>' +
    '<div class="stat"><div class="num" style="color:var(--progress)">' + tasks.filter(function(t) { return t.status === 'progress'; }).length + '</div><div class="label">In Progress</div></div>' +
    '<div class="stat"><div class="num" style="color:var(--done)">' + tasks.filter(function(t) { return t.status === 'done'; }).length + '</div><div class="label">Done</div></div>' +
    '<div class="stat"><div class="num" style="color:var(--high)">' + tasks.filter(function(t) { return t.priority === 'high'; }).length + '</div><div class="label">High Priority</div></div>';
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ---- Dark Mode ----
function toggleDark() {
  var isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('taskboard_dark', isDark ? '1' : '0');
  document.getElementById('themeBtn').innerHTML = isDark ? '&#9788;' : '&#9790;';
}
(function() {
  var saved = localStorage.getItem('taskboard_dark');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === '1' || (saved === null && prefersDark)) {
    document.documentElement.classList.add('dark');
    document.getElementById('themeBtn').innerHTML = '&#9788;';
  }
})();

refreshTasks();
setInterval(refreshTasks, 15000);
</script>
</body>
</html>
